<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brangola - Arquivo de Avaliação</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  
  <header class="global-header">
    <nav>
      <img src="logo/3da2c93b50f94d3195202a67860a61c8.jpg" alt="Brangola Logo" class="nav-logo" onerror="this.style.display='none'" />
      <div class="nav-links">
        <a href="index.html">INSERIR DADOS</a>
        <a href="historico.html" class="active">ARQUIVO DE AVALIAÇÃO</a>
        <a href="melhores.html">RANKING ESTELAR</a>
      </div>
      <button id="btn-logout" class="cyber-btn secondary" style="font-size:0.7em;">DESCONECTAR</button>
    </nav>
  </header>

  <h1 class="glitch" data-text="ARQUIVO DE AVALIAÇÃO">ARQUIVO DE AVALIAÇÃO</h1>

  <div style="text-align: center; margin-bottom: 20px;">
    <a href="melhores.html" class="cyber-btn primary" style="text-decoration:none;">VISUALIZAR PÓDIO 🏆</a>
  </div>

  <input type="text" id="busca" placeholder="Escanear base de dados..." />

  <div id="categorias" style="display:flex; justify-content:center; flex-wrap:wrap; margin-bottom: 20px;"></div>
  
  <div id="historico" class="grid-obras"></div>

  <template id="template-historico">
    <div class="card movie-card">
      <div class="poster-wrapper">
        <img class="imagem-obra" src="" alt="Capa" />
        <div class="poster-overlay">
          <span class="ver-detalhes-text">VER INFORMAÇÕES</span>
        </div>
      </div>
      <div class="card-footer-basic">
        <h2 class="titulo"></h2>
        <div class="movie-stats">
          <div class="stat">
            <span class="stat-icon" style="color: #ffd700;">⭐</span>
            <strong class="nota-final-numero"></strong>
          </div>
          <div class="stat">
            <span class="stat-icon" style="color: var(--tech-cyan);">💬</span>
             <span class="qtd-avaliacoes"></span> <span class="aval-label">avaliações</span>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- Modal de Detalhes da Obra -->
  <div id="movie-modal" class="modal-overlay">
    <div class="modal-container">
      <span class="modal-close">&times;</span>
      <div class="modal-content-grid" id="modal-content">
        <!-- Conteúdo injetado via JS -->
      </div>
    </div>
  </div>

  <script type="module" src="historico.js"></script>
</body>
</html>
