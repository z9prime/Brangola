<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brangola - Nova Avaliação</title>
  <link rel="stylesheet" href="style.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap"
    rel="stylesheet">
</head>

<body>

  <header class="global-header">
    <nav>
      <img src="logo/3da2c93b50f94d3195202a67860a61c8.jpg" alt="Brangola Logo" class="nav-logo" onerror="this.style.display='none'" />
      <div class="nav-links">
        <a href="index.html" class="active">INSERIR DADOS</a>
        <a href="historico.html">ARQUIVO DE AVALIAÇÃO</a>
        <a href="melhores.html">RANKING ESTELAR</a>
      </div>
      <button id="btn-logout" class="cyber-btn secondary pulse-tech" style="font-size:0.7em;">DESCONECTAR</button>
    </nav>
  </header>

  <h1 class="glitch" data-text="NOVA AVALIAÇÃO">NOVA AVALIAÇÃO</h1>

  <form id="avaliacao-form">
    <fieldset>
      <legend>DADOS DA OBRA</legend>

      <div class="input-group" style="position:relative;">
        <label>Nome da Obra (Pesquise ou Digite Nova):</label>
        <input type="text" id="titulo" placeholder="Procure por títulos existentes ou digite um novo..." autocomplete="off" required />
        <div id="sugestoes-obra"></div>
      </div>

      <div class="input-group">
        <label>Classificação (Tipo):</label>
        <select id="categoria" required>
          <option value="">Selecione...</option>
          <option value="Filmes">Filmes</option>
          <option value="Séries">Séries</option>
          <option value="Desenho animado">Desenho animado</option>
          <option value="Filme de desenho animado">Filme de desenho animado</option>
        </select>
      </div>

      <div class="input-group">
        <label>Link da Capa/Poster URL:</label>
        <input type="url" id="imagem_url" required />
      </div>

      <div id="campo-temporada" class="input-group">
        <label>Temporada:
          <input type="number" id="temporada" min="1" placeholder="Ex: 1" />
        </label>
      </div>
    </fieldset>

    <fieldset>
      <legend>AVALIAÇÃO DO OPERADOR: <span id="nome-operador">Carregando...</span></legend>

      <!-- 7 Critérios numéricos -->
      <label>História: <input type="number" id="historia" min="0" max="10" step="0.1" required /></label>
      <label>Personagens: <input type="number" id="personagens" min="0" max="10" step="0.1" required /></label>
      <label>Visual / Animação: <input type="number" id="visual_animacao" min="0" max="10" step="0.1"
          required /></label>
      <label>Som e Música: <input type="number" id="som_musica" min="0" max="10" step="0.1" required /></label>
      <label>Ritmo: <input type="number" id="ritmo" min="0" max="10" step="0.1" required /></label>
      <label>Originalidade: <input type="number" id="originalidade" min="0" max="10" step="0.1" required /></label>
      <label>Desfecho / Final: <input type="number" id="desfecho" min="0" max="10" step="0.1" required /></label>

      <hr style="border: 0; border-bottom: 1px dashed rgba(188, 19, 254, 0.5); margin: 25px 0;">

      <!-- Perguntas Subjetivas / Textuais -->
      <label style="color: var(--neon-cyan);">Personagem Favorito:
        <input type="text" id="personagem_favorito" />
      </label>

      <label style="color: var(--neon-cyan);">Recomendarias?
        <input type="text" id="recomendarias" placeholder="Sim/Não/Talvez..." />
      </label>

      <label style="color: var(--neon-cyan);">Melhor Cena / Momento:
        <input type="text" id="melhor_cena" />
      </label>

      <label style="color: var(--neon-cyan);">Superou as expectativas?
        <input type="text" id="superou_expectativas" />
      </label>

      <label style="color: var(--neon-cyan);">Define numa palavra:
        <input type="text" id="define_numa_palavra" />
      </label>
    </fieldset>

    <button type="submit" class="pulse-tech">Guardar avaliação</button>
  </form>

  <script type="module" src="index.js"></script>
</body>

</html>
