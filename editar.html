<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brangola - Atualizar Avaliação</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <header class="global-header">
    <nav>
      <img src="logo/3da2c93b50f94d3195202a67860a61c8.jpg" alt="Brangola Logo" class="nav-logo" onerror="this.style.display='none'" />
      <div class="nav-links">
        <a href="index.html">INSERIR DADOS</a>
        <a href="historico.html">ARQUIVO DE AVALIAÇÃO</a>
        <a href="melhores.html">RANKING ESTELAR</a>
      </div>
      <button id="btn-logout" class="cyber-btn secondary" style="font-size:0.7em;">DESCONECTAR</button>
    </nav>
  </header>

  <h1 class="glitch" data-text="ATUALIZAR REGISTO">ATUALIZAR REGISTO</h1>

  <div style="text-align: center; margin-bottom: 20px;">
    <button id="btn-voltar" class="cyber-btn secondary">CANCELAR EDIÇÃO</button>
  </div>

  <form id="editar-form" class="cyber-form" style="max-width: 650px; margin: 0 auto;">
    <fieldset>
      <legend>DADOS INICIAIS DA OBRA GERAL</legend>

      <label>Nome do Registo:
        <input type="text" id="titulo" readonly style="background: rgba(0,0,0,0.8); cursor: not-allowed;" />
      </label>

      <label>Classificação (Tipo):
        <input type="text" id="categoria" readonly style="background: rgba(0,0,0,0.8); cursor: not-allowed;" />
      </label>

      <label>Link da Capa/Poster URL:
        <input type="url" id="imagem_url" readonly style="background: rgba(0,0,0,0.8); cursor: not-allowed;" />
      </label>

    <div id="campo-temporada" class="input-group">
      <label>Temporada:
        <input type="text" id="temporada" readonly />
      </label>
    </div>
    <p style="font-size: 0.8em; color: var(--text-secondary);">Para alterar os dados base, contacte o Comando Central.</p>
  </fieldset>

  <fieldset>
    <legend>SUAS NOTAS E REGISTOS</legend>
    <div class="notas-grid">
      <div class="input-group"><label>História: <input type="number" id="historia" min="0" max="10" step="0.1" required /></label></div>
      <div class="input-group"><label>Personagens: <input type="number" id="personagens" min="0" max="10" step="0.1" required /></label></div>
      <div class="input-group"><label>Visual / Animação: <input type="number" id="visual_animacao" min="0" max="10" step="0.1" required /></label></div>
      <div class="input-group"><label>Som e Música: <input type="number" id="som_musica" min="0" max="10" step="0.1" required /></label></div>
      <div class="input-group"><label>Ritmo: <input type="number" id="ritmo" min="0" max="10" step="0.1" required /></label></div>
      <div class="input-group"><label>Originalidade: <input type="number" id="originalidade" min="0" max="10" step="0.1" required /></label></div>
      <div class="input-group"><label>Desfecho / Final: <input type="number" id="desfecho" min="0" max="10" step="0.1" required /></label></div>
    </div>

    <hr style="border: 0; border-bottom: 1px dashed var(--glass-border); margin: 25px 0;">

    <div class="input-group"><label>Personagem Favorito: <input type="text" id="personagem_favorito" /></label></div>
    <div class="input-group"><label>Recomendarias? <input type="text" id="recomendarias" placeholder="Sim/Não/Talvez..." /></label></div>
    <div class="input-group"><label>Melhor Cena / Momento: <input type="text" id="melhor_cena" /></label></div>
    <div class="input-group"><label>Superou as expectativas? <input type="text" id="superou_expectativas" /></label></div>
    <div class="input-group"><label>Define numa palavra: <input type="text" id="define_numa_palavra" /></label></div>
  </fieldset>

  <button type="submit" class="cyber-btn primary" style="width: 100%;">CONFIRMAR ATUALIZAÇÃO</button>
</form>

  <script type="module" src="editar.js"></script>
</body>

</html>
