<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brangola - Pódio da Matrix</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  
  <header class="global-header">
    <nav>
      <img src="logo/3da2c93b50f94d3195202a67860a61c8.jpg" alt="Brangola Logo" class="nav-logo" onerror="this.style.display='none'" />
      <div class="nav-links">
        <a href="index.html">INSERIR DADOS</a>
        <a href="historico.html">ARQUIVO DE AVALIAÇÃO</a>
        <a href="melhores.html" class="active">RANKING ESTELAR</a>
      </div>
      <button id="btn-logout" class="cyber-btn secondary" style="font-size:0.7em;">DESCONECTAR</button>
    </nav>
  </header>

  <h1 class="glitch" data-text="PÓDIO SUPREMO">PÓDIO SUPREMO</h1>
  <p style="text-align: center; color: var(--text-secondary); max-width: 600px; margin: 0 auto 30px;">
    Sistema de classificação com base nas médias consolidadas operadas pelo escuadrão completo na rede Brangola.
  </p>

  <div style="text-align: center;">
    <a href="historico.html" class="cyber-btn primary" style="text-decoration:none;">VISUALIZAR ARQUIVO 📔</a>
  </div>

  <div id="tabs-categorias" style="display:flex; justify-content:center; flex-wrap:wrap; margin-top:20px;">
    <!-- Renderizado via JS -->
  </div>

  <div id="podium-top" class="podium-wrapper">
    <!-- Top 3 renderizado aqui -->
  </div>

  <h2 class="glitch" data-text="OUTRAS CLASSIFICAÇÕES" style="font-size: 1.2em; margin-top: 40px; text-align: center;">OUTRAS CLASSIFICAÇÕES</h2>
  
  <div id="podio" class="grid-obras">
    <!-- Restantes renderizados aqui -->
  </div>

  <template id="template-melhores">
    <div class="card movie-card podio-item">
      <div class="poster-wrapper">
        <div class="rank-badge" style="position: absolute; top: 10px; right: 10px; font-family: 'Orbitron', Arial; font-size: 1.5em; font-weight: 900; color: #fff; text-shadow: 0 0 10px rgba(0,0,0,0.8); z-index: 5;"></div>
        <img class="imagem-obra" src="" alt="Capa" />
        <div class="poster-overlay">
          <span class="ver-detalhes-text">VER INFORMAÇÕES</span>
        </div>
      </div>
      <div class="card-footer-basic">
        <h2 class="titulo" style="text-align: center; font-size: 1.1em; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--star-white);"></h2>
        <div class="movie-stats" style="justify-content: center;">
          <div class="stat">
            <span class="stat-icon" style="color: #ffd700;">⭐</span>
            <strong class="nota-final-numero"></strong>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- Modal de Detalhes da Obra -->
  <div id="movie-modal" class="modal-overlay">
    <div class="modal-container">
      <span class="modal-close">&times;</span>
      <div class="modal-content-grid" id="modal-content">
        <!-- Conteúdo injetado via JS -->
      </div>
    </div>
  </div>

  <script type="module" src="melhores.js"></script>
</body>

</html>
